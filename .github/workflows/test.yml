name: Docker

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"
          
      - name: Install dependencies
        run: |
          cd GuitarShack/
          dotnet restore
        
      - name: Build
        run: |
          cd GuitarShack/
          dotnet build --no-restore
        
      - name: Test with the dotnet CLI
        run: |
          cd GuitarShack/
          dotnet test --no-build